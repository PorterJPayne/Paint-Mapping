<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Map Manager</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
}

.topbar{
  height:70px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.layout{
  display:flex;
  height:calc(100vh - 70px);
}

.map-section{
  flex:7;
  padding:16px;
  overflow:auto;
}

.sidebar{
  flex:3;
  background:white;
  border-left:1px solid #ddd;
  padding:20px;
}

.map-container{
  position:relative;
  width:100%;
}

#floorImage{
  width:100%;
  display:block;
}

#overlay{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.room{
  fill:rgba(0,150,255,0);
  stroke:rgba(0,150,255,0);
  stroke-width:2;
  cursor:pointer;
}

.room:hover{
  fill:rgba(0,150,255,0.25);
  stroke:rgba(0,150,255,0.9);
}

.room.active{
  fill:rgba(0,150,255,0.35);
  stroke:rgba(0,150,255,1);
}

.hidden{
  display:none;
}

.paint-card{
  border:1px solid #ddd;
  border-radius:8px;
  padding:14px;
  margin-bottom:14px;
}

.paint-card input,
textarea{
  width:100%;
  padding:8px;
  margin-top:4px;
  margin-bottom:12px;
}

button{
  padding:10px 14px;
  border:none;
  background:#222;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

button:hover{
  opacity:0.9;
}

</style>
</head>

<body>

<header class="topbar">

  <h2>Paint Map Manager</h2>

  <select id="floorSelect">
    <option value="1st-floor.png">1st Floor</option>
    <option value="2nd-floor.png">2nd Floor</option>
    <option value="5th-floor.png">5th Floor</option>
  </select>

</header>

<div class="layout">

  <section class="map-section">

    <div class="map-container">

      <img
        id="floorImage"
        src="./1st-floor.png"
      >

      <svg
        id="overlay"
        viewBox="0 0 2000 743"
        preserveAspectRatio="xMidYMid meet"
      >

        <polygon
          class="room"
          id="Snowbird"
          points="1505,525 1607,525 1607,586 1505,586"
        ></polygon>

        <polygon
          class="room"
          id="Sahara"
          points="1505,485 1634,485 1634,525 1505,525"
        ></polygon>

        <polygon
          class="room"
          id="SilverLake"
          points="1514,293 1634,293 1634,394 1514,394"
        ></polygon>

      </svg>

    </div>

  </section>

  <aside class="sidebar">

    <div id="emptyState">
      <h2>Select a room</h2>
    </div>

    <div id="roomPanel" class="hidden">

      <h2 id="roomTitle"></h2>

      <button id="editBtn">Edit</button>
      <button id="saveBtn" class="hidden">Save</button>

      <br><br>

      <div id="paintContainer"></div>

      <button id="addPaintBtn" class="hidden">
        + Add Paint
      </button>

      <br><br>

      <label>Notes</label>

      <textarea
        id="notesField"
        rows="6"
        disabled
      ></textarea>

    </div>

  </aside>

</div>

<script>

const floorSelect = document.getElementById("floorSelect");
const floorImage = document.getElementById("floorImage");

const emptyState = document.getElementById("emptyState");
const roomPanel = document.getElementById("roomPanel");
const roomTitle = document.getElementById("roomTitle");

const paintContainer = document.getElementById("paintContainer");
const notesField = document.getElementById("notesField");

const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");
const addPaintBtn = document.getElementById("addPaintBtn");

let editMode = false;
let currentRoom = null;

const defaultData = {

  Snowbird: {
    paints: [
      {
        location:"Walls",
        color:"Swiss Coffee",
        brand:"Sherwin Williams",
        finish:"Eggshell"
      }
    ],
    notes:""
  },

  Sahara: {
    paints: [
      {
        location:"Walls",
        color:"Agreeable Gray",
        brand:"Sherwin Williams",
        finish:"Flat"
      }
    ],
    notes:""
  },

  SilverLake: {
    paints: [
      {
        location:"Walls",
        color:"Pure White",
        brand:"Benjamin Moore",
        finish:"Semi-Gloss"
      }
    ],
    notes:""
  }

};

function getData(){

  const saved = localStorage.getItem("paintMapData");

  if(saved){
    return JSON.parse(saved);
  }

  localStorage.setItem(
    "paintMapData",
    JSON.stringify(defaultData)
  );

  return defaultData;
}

let appData = getData();

floorSelect.addEventListener("change", ()=>{

  floorImage.src = "./" + floorSelect.value;

  roomPanel.classList.add("hidden");
  emptyState.classList.remove("hidden");

  document.querySelectorAll(".room").forEach(room=>{
    room.classList.remove("active");
  });

});

document.querySelectorAll(".room").forEach(room=>{

  room.addEventListener("click", ()=>{

    currentRoom = room.id;

    document.querySelectorAll(".room").forEach(r=>{
      r.classList.remove("active");
    });

    room.classList.add("active");

    emptyState.classList.add("hidden");
    roomPanel.classList.remove("hidden");

    roomTitle.textContent = currentRoom;

    renderRoom();

  });

});

function renderRoom(){

  const roomData = appData[currentRoom];

  paintContainer.innerHTML = "";

  roomData.paints.forEach((paint,index)=>{

    const card = document.createElement("div");

    card.className = "paint-card";

    card.innerHTML = `

      <label>Location</label>
      <input
        data-field="location"
        data-index="${index}"
        value="${paint.location}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Color</label>
      <input
        data-field="color"
        data-index="${index}"
        value="${paint.color}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Brand</label>
      <input
        data-field="brand"
        data-index="${index}"
        value="${paint.brand}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Finish</label>
      <input
        data-field="finish"
        data-index="${index}"
        value="${paint.finish}"
        ${!editMode ? "disabled" : ""}
      >

    `;

    paintContainer.appendChild(card);

  });

  notesField.value = roomData.notes;
  notesField.disabled = !editMode;

}

editBtn.addEventListener("click", ()=>{

  editMode = true;

  editBtn.classList.add("hidden");
  saveBtn.classList.remove("hidden");
  addPaintBtn.classList.remove("hidden");

  renderRoom();

});

saveBtn.addEventListener("click", ()=>{

  const roomData = appData[currentRoom];

  const inputs = document.querySelectorAll(".paint-card input");

  inputs.forEach(input=>{

    const index = input.dataset.index;
    const field = input.dataset.field;

    roomData.paints[index][field] = input.value;

  });

  roomData.notes = notesField.value;

  localStorage.setItem(
    "paintMapData",
    JSON.stringify(appData)
  );

  editMode = false;

  saveBtn.classList.add("hidden");
  addPaintBtn.classList.add("hidden");
  editBtn.classList.remove("hidden");

  renderRoom();

});

addPaintBtn.addEventListener("click", ()=>{

  appData[currentRoom].paints.push({
    location:"",
    color:"",
    brand:"",
    finish:""
  });

  renderRoom();

});

</script>

</body>
</html>

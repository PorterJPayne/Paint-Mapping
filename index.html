<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Paint Map Manager</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
  overflow:hidden;
}

.topbar{
  height:70px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.layout{
  display:flex;
  height:calc(100vh - 70px);
}

.room-list{
  width:170px;
  min-width:170px;
  background:white;
  border-right:1px solid #ddd;
  overflow-y:auto;
  padding:12px;
}

.room-list h3{
  margin-top:0;
  margin-bottom:12px;
  font-size:15px;
}

.room-list-item{
  padding:7px 8px;
  border-radius:6px;
  cursor:pointer;
  margin-bottom:4px;
  border:1px solid transparent;
  font-size:13px;
}

.room-list-item:hover{
  background:#f2f2f2;
}

.room-list-item.active{
  background:#e9f3ff;
  border-color:#7db7ff;
}

.layout-main{
  flex:1;
  display:flex;
  overflow:hidden;
}

.map-section{
  flex:7;
  overflow:hidden;
  position:relative;
  background:#ddd;
}

.sidebar{
  flex:3;
  background:white;
  border-left:1px solid #ddd;
  padding:20px;
  overflow-y:auto;
}

.map-viewport{
  width:100%;
  height:100%;
  overflow:hidden;
  cursor:grab;
  position:relative;
}

.map-viewport.dragging{
  cursor:grabbing;
}

.map-transform{
  transform-origin:0 0;
  position:absolute;
  left:0;
  top:0;
}

.map-container{
  position:relative;
  width:2000px;
  height:743px;
}

#floorImage{
  width:2000px;
  height:743px;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

#overlay{
  position:absolute;
  inset:0;
  width:2000px;
  height:743px;
}

.room{
  fill:rgba(0,150,255,0.08);
  stroke:rgba(0,150,255,0.5);
  stroke-width:2;
  vector-effect:non-scaling-stroke;
  cursor:pointer;
}

.room:hover{
  fill:rgba(0,150,255,0.25);
  stroke:rgba(0,150,255,1);
}

.room.active{
  fill:rgba(0,150,255,0.35);
  stroke:rgba(0,150,255,1);
}

.draw-point{
  fill:red;
}

.temp-line{
  stroke:red;
  stroke-width:2;
  fill:rgba(255,0,0,0.12);
}

.point-label{
  fill:red;
  font-size:18px;
  font-weight:bold;
}

.vertex{
  fill:#ff9800;
  stroke:white;
  stroke-width:2;
  cursor:move;
}

button{
  padding:10px 14px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

button.secondary{
  background:#777;
}

button.danger{
  background:#b42318;
}

button.small-danger{
  background:#b42318;
  padding:6px 10px;
  font-size:12px;
}

.hidden{
  display:none;
}

.draw-status{
  position:absolute;
  top:12px;
  left:12px;
  background:rgba(0,0,0,0.75);
  color:white;
  padding:10px 14px;
  border-radius:8px;
  font-size:14px;
  z-index:50;
}

.instructions{
  font-size:14px;
  color:#666;
  line-height:1.5;
}

.room-header{
  position:sticky;
  top:-20px;
  background:white;
  padding-bottom:14px;
  margin-bottom:18px;
  border-bottom:1px solid #ddd;
  z-index:20;
}

.room-title{
  margin:0;
  font-size:32px;
}

.floor-label{
  color:#666;
  margin-top:6px;
  font-size:14px;
}

.paint-display-card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:18px;
  margin-bottom:16px;
  background:#fafafa;
}

.paint-surface{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.paint-name{
  font-size:26px;
  font-weight:bold;
  margin-bottom:8px;
}

.paint-code{
  font-size:18px;
  color:#444;
  margin-bottom:16px;
}

.paint-meta-row{
  display:flex;
  gap:20px;
}

.paint-meta{
  flex:1;
}

.meta-label{
  font-size:11px;
  color:#777;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
}

.meta-value{
  font-size:16px;
}

.notes-section{
  margin-top:20px;
}

.notes-text{
  background:#fafafa;
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
  line-height:1.5;
}

.edit-card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:16px;
  margin-bottom:16px;
  background:#fafafa;
}

.edit-card input,
textarea{
  width:100%;
  padding:10px;
  margin-top:4px;
  margin-bottom:14px;
}

.edit-buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.search-input{
  width:240px;
  padding:10px 12px;
  border:1px solid #ccc;
  border-radius:8px;
}

.save-indicator{
  font-size:13px;
  color:#1d7a34;
  font-weight:bold;
  width:60px;
}

.zoom-controls{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:100;
}

.zoom-controls button{
  width:42px;
  height:42px;
  padding:0;
  font-size:20px;
}

</style>

</head>

<body>

<header class="topbar">

  <div class="topbar-left">

    <h2>
      Paint Map Manager
    </h2>

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search room..."
    >

  </div>

  <div class="topbar-right">

    <div
      id="saveIndicator"
      class="save-indicator"
    ></div>

    <button id="exportBtn">
      Export
    </button>

    <button id="importBtn">
      Import
    </button>

    <input
      type="file"
      id="importFile"
      hidden
    >

    <button id="drawBtn">
      Draw Room
    </button>

    <button
      id="undoBtn"
      class="hidden secondary"
    >
      Undo Point
    </button>

    <button
      id="finishBtn"
      class="hidden"
    >
      Finish Room
    </button>

    <button
      id="cancelBtn"
      class="hidden secondary"
    >
      Cancel
    </button>

    <button
      id="resetViewBtn"
      class="secondary"
    >
      Reset View
    </button>

    <select id="floorSelect">

      <option value="1st-floor">
        1st Floor
      </option>

      <option value="2nd-floor">
        2nd Floor
      </option>

      <option value="5th-floor">
        5th Floor
      </option>

    </select>

  </div>

</header>

<div class="layout">

  <aside class="room-list">

    <h3>
      Rooms
    </h3>

    <div id="roomList"></div>

  </aside>

  <div class="layout-main">

    <section class="map-section">

      <div
        id="drawStatus"
        class="draw-status hidden"
      >

        Drawing Room...

        <br><br>

        ENTER = Finish

        <br>

        ESC = Cancel

        <br>

        BACKSPACE = Undo

      </div>

      <div
        id="mapViewport"
        class="map-viewport"
      >

        <div
          id="mapTransform"
          class="map-transform"
        >

          <div class="map-container">

            <img
              id="floorImage"
              src="1st-floor.png"
            >

            <svg
              id="overlay"
              viewBox="0 0 2000 743"
              preserveAspectRatio="none"
            ></svg>

          </div>

        </div>

      </div>

      <div class="zoom-controls">

        <button id="zoomInBtn">
          +
        </button>

        <button id="zoomOutBtn">
          −
        </button>

      </div>

    </section>

    <aside class="sidebar">

      <div id="emptyState">

        <h2>
          Select a room
        </h2>

      </div>

      <div
        id="roomPanel"
        class="hidden"
      >

        <div class="room-header">

          <h1
            id="roomTitle"
            class="room-title"
          ></h1>

          <div
            id="floorLabel"
            class="floor-label"
          ></div>

          <div class="edit-buttons">

            <button id="editBtn">
              Edit
            </button>

            <button
              id="saveBtn"
              class="hidden"
            >
              Save
            </button>

            <button
              id="cancelEditBtn"
              class="hidden secondary"
            >
              Cancel
            </button>

            <button
              id="deleteRoomBtn"
              class="hidden small-danger"
            >
              Delete Room
            </button>

          </div>

        </div>

        <div id="paintContainer"></div>

        <button
          id="addPaintBtn"
          class="hidden"
        >
          + Add Paint
        </button>

        <div class="notes-section">

          <h3>
            Notes
          </h3>

          <div
            id="notesDisplay"
            class="notes-text"
          >
            No notes
          </div>

          <textarea
            id="notesField"
            rows="5"
            class="hidden"
          ></textarea>

        </div>

      </div>

    </aside>

  </div>

</div>

<script>

const MAP_WIDTH = 2000;
const MAP_HEIGHT = 743;

const floorImage = document.getElementById("floorImage");
const floorSelect = document.getElementById("floorSelect");
const overlay = document.getElementById("overlay");

const mapViewport = document.getElementById("mapViewport");
const mapTransform = document.getElementById("mapTransform");

const zoomInBtn = document.getElementById("zoomInBtn");
const zoomOutBtn = document.getElementById("zoomOutBtn");
const resetViewBtn = document.getElementById("resetViewBtn");

let zoom = 1;
let panX = 0;
let panY = 0;

let isDraggingMap = false;
let dragStartX = 0;
let dragStartY = 0;

function updateTransform(){

  mapTransform.style.transform =
    `
    translate(${panX}px, ${panY}px)
    scale(${zoom})
    `;

}

function centerMap(){

  const viewportWidth =
    mapViewport.clientWidth;

  const viewportHeight =
    mapViewport.clientHeight;

  panX =
    (viewportWidth - MAP_WIDTH) / 2;

  panY =
    (viewportHeight - MAP_HEIGHT) / 2;

  updateTransform();

}

function resetView(){

  zoom = 1;

  centerMap();

}

function zoomAtPoint(
  screenX,
  screenY,
  zoomFactor
){

  const oldZoom = zoom;

  zoom *= zoomFactor;

  zoom =
    Math.max(
      0.4,
      Math.min(zoom, 5)
    );

  const zoomRatio =
    zoom / oldZoom;

  const rect =
    mapViewport.getBoundingClientRect();

  const viewportX =
    screenX - rect.left;

  const viewportY =
    screenY - rect.top;

  panX =
    viewportX -
    (viewportX - panX)
    * zoomRatio;

  panY =
    viewportY -
    (viewportY - panY)
    * zoomRatio;

  updateTransform();

}

function zoomIn(){

  const rect =
    mapViewport.getBoundingClientRect();

  zoomAtPoint(
    rect.left + rect.width / 2,
    rect.top + rect.height / 2,
    1.12
  );

}

function zoomOut(){

  const rect =
    mapViewport.getBoundingClientRect();

  zoomAtPoint(
    rect.left + rect.width / 2,
    rect.top + rect.height / 2,
    0.89
  );

}

zoomInBtn.addEventListener(
  "click",
  zoomIn
);

zoomOutBtn.addEventListener(
  "click",
  zoomOut
);

resetViewBtn.addEventListener(
  "click",
  resetView
);

mapViewport.addEventListener(
  "wheel",
  (event)=>{

    event.preventDefault();

    const zoomFactor =
      event.deltaY < 0
      ? 1.03
      : 0.97;

    zoomAtPoint(
      event.clientX,
      event.clientY,
      zoomFactor
    );

  },
  { passive:false }
);

mapViewport.addEventListener(
  "mousedown",
  (event)=>{

    if(event.target.closest(".vertex"))
      return;

    isDraggingMap = true;

    dragStartX =
      event.clientX - panX;

    dragStartY =
      event.clientY - panY;

    mapViewport.classList.add(
      "dragging"
    );

  }
);

document.addEventListener(
  "mousemove",
  (event)=>{

    if(!isDraggingMap) return;

    panX =
      event.clientX - dragStartX;

    panY =
      event.clientY - dragStartY;

    updateTransform();

  }
);

document.addEventListener(
  "mouseup",
  ()=>{

    isDraggingMap = false;

    mapViewport.classList.remove(
      "dragging"
    );

  }
);

window.addEventListener(
  "load",
  ()=>{

    centerMap();

  }
);

window.addEventListener(
  "resize",
  ()=>{

    centerMap();

  }
);

</script>

</body>
</html>

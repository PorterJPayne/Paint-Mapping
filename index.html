<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Map Manager</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
}

.topbar{
  height:70px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.layout{
  display:flex;
  height:calc(100vh - 70px);
}

.map-section{
  flex:7;
  overflow:auto;
  padding:16px;
}

.sidebar{
  flex:3;
  background:white;
  border-left:1px solid #ddd;
  padding:20px;
  overflow-y:auto;
}

.map-container{
  position:relative;
  width:100%;
}

#floorImage{
  width:100%;
  display:block;
}

#overlay{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.room{
  fill:rgba(0,150,255,0.08);
  stroke:rgba(0,150,255,0.4);
  stroke-width:2;
  vector-effect:non-scaling-stroke;
  cursor:pointer;
}

.room:hover{
  fill:rgba(0,150,255,0.25);
  stroke:rgba(0,150,255,1);
}

.room.active{
  fill:rgba(0,150,255,0.35);
  stroke:rgba(0,150,255,1);
}

.draw-point{
  fill:red;
}

.temp-line{
  stroke:red;
  stroke-width:2;
}

button{
  padding:10px 14px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-right:8px;
}

button:hover{
  opacity:0.9;
}

.paint-card{
  border:1px solid #ddd;
  border-radius:8px;
  padding:14px;
  margin-bottom:16px;
}

.paint-card input,
textarea{
  width:100%;
  padding:8px;
  margin-top:4px;
  margin-bottom:12px;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<header class="topbar">

  <h2>Paint Map Manager</h2>

  <div>

    <button id="drawBtn">Draw Room</button>
    <button id="finishBtn" class="hidden">Finish Room</button>
    <button id="cancelBtn" class="hidden">Cancel</button>

    <select id="floorSelect">
      <option value="1st-floor">1st Floor</option>
      <option value="2nd-floor">2nd Floor</option>
      <option value="5th-floor">5th Floor</option>
    </select>

  </div>

</header>

<div class="layout">

  <section class="map-section">

    <div class="map-container">

      <img
        id="floorImage"
        src="1st-floor.png"
      >

      <svg
        id="overlay"
        viewBox="0 0 2000 743"
        preserveAspectRatio="xMidYMid meet"
      ></svg>

    </div>

  </section>

  <aside class="sidebar">

    <div id="emptyState">
      <h2>Select a room</h2>
    </div>

    <div id="roomPanel" class="hidden">

      <h2 id="roomTitle"></h2>

      <button id="editBtn">Edit</button>
      <button id="saveBtn" class="hidden">Save</button>

      <br><br>

      <div id="paintContainer"></div>

      <button id="addPaintBtn" class="hidden">
        + Add Paint
      </button>

      <br><br>

      <label>Notes</label>

      <textarea
        id="notesField"
        rows="6"
        disabled
      ></textarea>

    </div>

  </aside>

</div>

<script>

const floorImage = document.getElementById("floorImage");
const floorSelect = document.getElementById("floorSelect");
const overlay = document.getElementById("overlay");

const drawBtn = document.getElementById("drawBtn");
const finishBtn = document.getElementById("finishBtn");
const cancelBtn = document.getElementById("cancelBtn");

const roomPanel = document.getElementById("roomPanel");
const emptyState = document.getElementById("emptyState");

const roomTitle = document.getElementById("roomTitle");
const paintContainer = document.getElementById("paintContainer");
const notesField = document.getElementById("notesField");

const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");
const addPaintBtn = document.getElementById("addPaintBtn");

let currentFloor = "1st-floor";
let currentRoom = null;
let editMode = false;

let drawMode = false;
let drawPoints = [];

const defaultBuildingData = {

  floors: {

    "1st-floor": {
      image: "1st-floor.png",
      rooms: []
    },

    "2nd-floor": {
      image: "2nd-floor.png",
      rooms: []
    },

    "5th-floor": {
      image: "5th-floor.png",
      rooms: []
    }

  }

};

function loadData(){

  const saved = localStorage.getItem("buildingData");

  if(saved){
    return JSON.parse(saved);
  }

  localStorage.setItem(
    "buildingData",
    JSON.stringify(defaultBuildingData)
  );

  return defaultBuildingData;
}

let buildingData = loadData();

function saveData(){

  localStorage.setItem(
    "buildingData",
    JSON.stringify(buildingData)
  );

}

function renderFloor(){

  overlay.innerHTML = "";

  const floor = buildingData.floors[currentFloor];

  floorImage.src = floor.image;

  floor.rooms.forEach(room=>{

    const polygon = document.createElementNS(
      "http://www.w3.org/2000/svg",
      "polygon"
    );

    polygon.setAttribute("points", room.points);
    polygon.setAttribute("class", "room");
    polygon.setAttribute("data-room-id", room.id);

    polygon.addEventListener("click", ()=>{

      selectRoom(room.id);

      document.querySelectorAll(".room").forEach(r=>{
        r.classList.remove("active");
      });

      polygon.classList.add("active");

    });

    overlay.appendChild(polygon);

  });

}

function selectRoom(roomId){

  currentRoom = roomId;

  const room = getCurrentRoom();

  emptyState.classList.add("hidden");
  roomPanel.classList.remove("hidden");

  roomTitle.textContent = room.id;

  renderRoomData();

}

function getCurrentRoom(){

  return buildingData
    .floors[currentFloor]
    .rooms
    .find(room=>room.id === currentRoom);

}

function renderRoomData(){

  const room = getCurrentRoom();

  paintContainer.innerHTML = "";

  room.paints.forEach((paint,index)=>{

    const card = document.createElement("div");

    card.className = "paint-card";

    card.innerHTML = `

      <label>Location</label>
      <input
        data-field="location"
        data-index="${index}"
        value="${paint.location}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Color</label>
      <input
        data-field="color"
        data-index="${index}"
        value="${paint.color}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Brand</label>
      <input
        data-field="brand"
        data-index="${index}"
        value="${paint.brand}"
        ${!editMode ? "disabled" : ""}
      >

      <label>Finish</label>
      <input
        data-field="finish"
        data-index="${index}"
        value="${paint.finish}"
        ${!editMode ? "disabled" : ""}
      >

    `;

    paintContainer.appendChild(card);

  });

  notesField.value = room.notes;
  notesField.disabled = !editMode;

}

floorSelect.addEventListener("change", ()=>{

  currentFloor = floorSelect.value;

  roomPanel.classList.add("hidden");
  emptyState.classList.remove("hidden");

  renderFloor();

});

drawBtn.addEventListener("click", ()=>{

  drawMode = true;
  drawPoints = [];

  drawBtn.classList.add("hidden");
  finishBtn.classList.remove("hidden");
  cancelBtn.classList.remove("hidden");

});

cancelBtn.addEventListener("click", ()=>{

  drawMode = false;
  drawPoints = [];

  renderFloor();

  drawBtn.classList.remove("hidden");
  finishBtn.classList.add("hidden");
  cancelBtn.classList.add("hidden");

});

overlay.addEventListener("click", (event)=>{

  if(!drawMode) return;

  const svgRect = overlay.getBoundingClientRect();

  const x = ((event.clientX - svgRect.left) / svgRect.width) * 2000;
  const y = ((event.clientY - svgRect.top) / svgRect.height) * 743;

  drawPoints.push([x,y]);

  renderFloor();
  renderDrawPreview();

});

function renderDrawPreview(){

  drawPoints.forEach(point=>{

    const circle = document.createElementNS(
      "http://www.w3.org/2000/svg",
      "circle"
    );

    circle.setAttribute("cx", point[0]);
    circle.setAttribute("cy", point[1]);
    circle.setAttribute("r", 5);
    circle.setAttribute("class", "draw-point");

    overlay.appendChild(circle);

  });

  if(drawPoints.length > 1){

    const polyline = document.createElementNS(
      "http://www.w3.org/2000/svg",
      "polyline"
    );

    const pointString = drawPoints
      .map(p=>`${p[0]},${p[1]}`)
      .join(" ");

    polyline.setAttribute("points", pointString);
    polyline.setAttribute("fill", "none");
    polyline.setAttribute("class", "temp-line");

    overlay.appendChild(polyline);

  }

}

finishBtn.addEventListener("click", ()=>{

  if(drawPoints.length < 3){
    alert("Need at least 3 points");
    return;
  }

  const roomName = prompt("Enter room name");

  if(!roomName) return;

  const room = {

    id: roomName,

    points: drawPoints
      .map(p=>`${p[0]},${p[1]}`)
      .join(" "),

    paints: [],

    notes: ""

  };

  buildingData
    .floors[currentFloor]
    .rooms
    .push(room);

  saveData();

  drawMode = false;
  drawPoints = [];

  drawBtn.classList.remove("hidden");
  finishBtn.classList.add("hidden");
  cancelBtn.classList.add("hidden");

  renderFloor();

});

editBtn.addEventListener("click", ()=>{

  editMode = true;

  editBtn.classList.add("hidden");
  saveBtn.classList.remove("hidden");
  addPaintBtn.classList.remove("hidden");

  renderRoomData();

});

saveBtn.addEventListener("click", ()=>{

  const room = getCurrentRoom();

  const inputs = document.querySelectorAll(".paint-card input");

  inputs.forEach(input=>{

    const index = input.dataset.index;
    const field = input.dataset.field;

    room.paints[index][field] = input.value;

  });

  room.notes = notesField.value;

  saveData();

  editMode = false;

  editBtn.classList.remove("hidden");
  saveBtn.classList.add("hidden");
  addPaintBtn.classList.add("hidden");

  renderRoomData();

});

addPaintBtn.addEventListener("click", ()=>{

  const room = getCurrentRoom();

  room.paints.push({
    location:"",
    color:"",
    brand:"",
    finish:""
  });

  renderRoomData();

});

renderFloor();

</script>

</body>
</html>

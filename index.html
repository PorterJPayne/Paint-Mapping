<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Paint Map Manager</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
}

.topbar{
  height:70px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.layout{
  display:flex;
  height:calc(100vh - 70px);
}

.map-section{
  flex:7;
  overflow:auto;
  padding:16px;
}

.sidebar{
  flex:3;
  background:white;
  border-left:1px solid #ddd;
  padding:20px;
  overflow-y:auto;
}

.map-container{
  position:relative;
  width:100%;
}

#floorImage{
  width:100%;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

#overlay{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.room{
  fill:rgba(0,150,255,0.08);
  stroke:rgba(0,150,255,0.5);
  stroke-width:2;
  vector-effect:non-scaling-stroke;
  cursor:pointer;
  transition:0.15s;
}

.room:hover{
  fill:rgba(0,150,255,0.25);
  stroke:rgba(0,150,255,1);
}

.room.active{
  fill:rgba(0,150,255,0.35);
  stroke:rgba(0,150,255,1);
}

.draw-point{
  fill:red;
}

.temp-line{
  stroke:red;
  stroke-width:2;
  fill:rgba(255,0,0,0.12);
}

.point-label{
  fill:red;
  font-size:18px;
  font-weight:bold;
  user-select:none;
}

button{
  padding:10px 14px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

button.secondary{
  background:#777;
}

button.danger{
  background:#b42318;
}

.paint-card{
  border:1px solid #ddd;
  border-radius:8px;
  padding:14px;
  margin-bottom:16px;
  background:#fafafa;
}

.paint-card input,
textarea{
  width:100%;
  padding:8px;
  margin-top:4px;
  margin-bottom:12px;
}

.hidden{
  display:none;
}

.room-title{
  margin-top:0;
}

.draw-status{
  position:absolute;
  top:12px;
  left:12px;
  background:rgba(0,0,0,0.75);
  color:white;
  padding:10px 14px;
  border-radius:8px;
  font-size:14px;
  z-index:10;
}

.instructions{
  font-size:14px;
  color:#666;
  line-height:1.5;
}

</style>

</head>

<body>

<header class="topbar">

  <div class="topbar-left">

    <h2>
      Paint Map Manager
    </h2>

  </div>

  <div class="topbar-right">

    <button id="drawBtn">
      Draw Room
    </button>

    <button
      id="finishBtn"
      class="hidden"
    >
      Finish Room
    </button>

    <button
      id="cancelBtn"
      class="hidden secondary"
    >
      Cancel
    </button>

    <select id="floorSelect">

      <option value="1st-floor">
        1st Floor
      </option>

      <option value="2nd-floor">
        2nd Floor
      </option>

      <option value="5th-floor">
        5th Floor
      </option>

    </select>

  </div>

</header>

<div class="layout">

  <section class="map-section">

    <div class="map-container">

      <div
        id="drawStatus"
        class="draw-status hidden"
      >

        Drawing Room...

        <br>

        ENTER = Finish

        <br>

        ESC = Cancel

      </div>

      <img
        id="floorImage"
        src="1st-floor.png"
      >

      <svg
        id="overlay"
        viewBox="0 0 2000 743"
        preserveAspectRatio="xMidYMid meet"
      ></svg>

    </div>

  </section>

  <aside class="sidebar">

    <div id="emptyState">

      <h2>
        Select a room
      </h2>

      <div class="instructions">

        Click a room polygon
        to view paint info.

        <br><br>

        Use Draw Room to
        create new rooms.

      </div>

    </div>

    <div
      id="roomPanel"
      class="hidden"
    >

      <h2
        id="roomTitle"
        class="room-title"
      ></h2>

      <button id="editBtn">
        Edit
      </button>

      <button
        id="saveBtn"
        class="hidden"
      >
        Save
      </button>

      <br><br>

      <div id="paintContainer"></div>

      <button
        id="addPaintBtn"
        class="hidden"
      >
        + Add Paint
      </button>

      <br><br>

      <label>
        Notes
      </label>

      <textarea
        id="notesField"
        rows="6"
        disabled
      ></textarea>

    </div>

  </aside>

</div>

<script>

const SVG_WIDTH = 2000;
const SVG_HEIGHT = 743;

const floorImage =
  document.getElementById("floorImage");

const floorSelect =
  document.getElementById("floorSelect");

const overlay =
  document.getElementById("overlay");

const drawBtn =
  document.getElementById("drawBtn");

const finishBtn =
  document.getElementById("finishBtn");

const cancelBtn =
  document.getElementById("cancelBtn");

const drawStatus =
  document.getElementById("drawStatus");

const roomPanel =
  document.getElementById("roomPanel");

const emptyState =
  document.getElementById("emptyState");

const roomTitle =
  document.getElementById("roomTitle");

const paintContainer =
  document.getElementById("paintContainer");

const notesField =
  document.getElementById("notesField");

const editBtn =
  document.getElementById("editBtn");

const saveBtn =
  document.getElementById("saveBtn");

const addPaintBtn =
  document.getElementById("addPaintBtn");

let currentFloor = "1st-floor";

let currentRoom = null;

let editMode = false;

let drawMode = false;

let drawPoints = [];

const defaultBuildingData = {

  floors: {

    "1st-floor": {

      image:"1st-floor.png",

      rooms:[]

    },

    "2nd-floor": {

      image:"2nd-floor.png",

      rooms:[]

    },

    "5th-floor": {

      image:"5th-floor.png",

      rooms:[]

    }

  }

};

function loadData(){

  const saved =
    localStorage.getItem(
      "buildingData"
    );

  if(saved){

    return JSON.parse(saved);

  }

  localStorage.setItem(
    "buildingData",
    JSON.stringify(
      defaultBuildingData
    )
  );

  return defaultBuildingData;

}

let buildingData = loadData();

function saveData(){

  localStorage.setItem(
    "buildingData",
    JSON.stringify(buildingData)
  );

}

function getCurrentFloorData(){

  return buildingData
    .floors[currentFloor];

}

function getCurrentRoom(){

  return getCurrentFloorData()
    .rooms
    .find(
      room => room.id === currentRoom
    );

}

function renderFloor(){

  overlay.innerHTML = "";

  const floor =
    getCurrentFloorData();

  floorImage.src = floor.image;

  floor.rooms.forEach(room => {

    const polygon =
      document.createElementNS(
        "http://www.w3.org/2000/svg",
        "polygon"
      );

    polygon.setAttribute(
      "points",
      room.points
    );

    polygon.setAttribute(
      "class",
      "room"
    );

    polygon.dataset.roomId =
      room.id;

    polygon.addEventListener(
      "click",
      (event)=>{

        if(drawMode) return;

        event.stopPropagation();

        selectRoom(room.id);

        document
          .querySelectorAll(".room")
          .forEach(r => {
            r.classList.remove("active");
          });

        polygon.classList.add(
          "active"
        );

      }
    );

    overlay.appendChild(
      polygon
    );

  });

  if(drawMode){

    renderDrawPreview();

  }

}

function selectRoom(roomId){

  currentRoom = roomId;

  const room =
    getCurrentRoom();

  if(!room) return;

  emptyState.classList.add(
    "hidden"
  );

  roomPanel.classList.remove(
    "hidden"
  );

  roomTitle.textContent =
    room.id;

  renderRoomData();

}

function renderRoomData(){

  const room =
    getCurrentRoom();

  paintContainer.innerHTML =
    "";

  room.paints.forEach(
    (paint,index)=>{

      const card =
        document.createElement("div");

      card.className =
        "paint-card";

      card.innerHTML = `

        <label>Location</label>

        <input
          data-field="location"
          data-index="${index}"
          value="${paint.location}"
          ${!editMode ? "disabled" : ""}
        >

        <label>Color</label>

        <input
          data-field="color"
          data-index="${index}"
          value="${paint.color}"
          ${!editMode ? "disabled" : ""}
        >

        <label>Brand</label>

        <input
          data-field="brand"
          data-index="${index}"
          value="${paint.brand}"
          ${!editMode ? "disabled" : ""}
        >

        <label>Finish</label>

        <input
          data-field="finish"
          data-index="${index}"
          value="${paint.finish}"
          ${!editMode ? "disabled" : ""}
        >

      `;

      paintContainer.appendChild(
        card
      );

    }
  );

  notesField.value =
    room.notes;

  notesField.disabled =
    !editMode;

}

function startDrawMode(){

  drawMode = true;

  drawPoints = [];

  drawBtn.classList.add(
    "hidden"
  );

  finishBtn.classList.remove(
    "hidden"
  );

  cancelBtn.classList.remove(
    "hidden"
  );

  drawStatus.classList.remove(
    "hidden"
  );

  renderFloor();

}

function cancelDrawMode(){

  drawMode = false;

  drawPoints = [];

  drawBtn.classList.remove(
    "hidden"
  );

  finishBtn.classList.add(
    "hidden"
  );

  cancelBtn.classList.add(
    "hidden"
  );

  drawStatus.classList.add(
    "hidden"
  );

  renderFloor();

}

function finishDrawMode(){

  if(drawPoints.length < 3){

    alert(
      "Need at least 3 points"
    );

    return;

  }

  const roomName = prompt(
    "Enter room name"
  );

  if(!roomName) return;

  const room = {

    id: roomName,

    points: drawPoints
      .map(
        p => `${p[0]},${p[1]}`
      )
      .join(" "),

    paints:[],

    notes:""

  };

  getCurrentFloorData()
    .rooms
    .push(room);

  saveData();

  drawMode = false;

  drawPoints = [];

  drawBtn.classList.remove(
    "hidden"
  );

  finishBtn.classList.add(
    "hidden"
  );

  cancelBtn.classList.add(
    "hidden"
  );

  drawStatus.classList.add(
    "hidden"
  );

  renderFloor();

}

function renderDrawPreview(){

  drawPoints.forEach(
    (point,index)=>{

      const circle =
        document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );

      circle.setAttribute(
        "cx",
        point[0]
      );

      circle.setAttribute(
        "cy",
        point[1]
      );

      circle.setAttribute(
        "r",
        5
      );

      circle.setAttribute(
        "class",
        "draw-point"
      );

      overlay.appendChild(
        circle
      );

      const text =
        document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text"
        );

      text.setAttribute(
        "x",
        point[0] + 10
      );

      text.setAttribute(
        "y",
        point[1] - 10
      );

      text.setAttribute(
        "class",
        "point-label"
      );

      text.textContent =
        index + 1;

      overlay.appendChild(
        text
      );

    }
  );

  if(drawPoints.length > 1){

    const polyline =
      document.createElementNS(
        "http://www.w3.org/2000/svg",
        "polyline"
      );

    polyline.setAttribute(
      "points",
      drawPoints
        .map(
          p => `${p[0]},${p[1]}`
        )
        .join(" ")
    );

    polyline.setAttribute(
      "class",
      "temp-line"
    );

    overlay.appendChild(
      polyline
    );

  }

}

overlay.addEventListener(
  "click",
  (event)=>{

    if(!drawMode) return;

    const pt =
      overlay.createSVGPoint();

    pt.x = event.clientX;

    pt.y = event.clientY;

    const svgPoint =
      pt.matrixTransform(
        overlay
          .getScreenCTM()
          .inverse()
      );

    drawPoints.push([
      svgPoint.x,
      svgPoint.y
    ]);

    renderFloor();

  }
);

drawBtn.addEventListener(
  "click",
  startDrawMode
);

cancelBtn.addEventListener(
  "click",
  cancelDrawMode
);

finishBtn.addEventListener(
  "click",
  finishDrawMode
);

floorSelect.addEventListener(
  "change",
  ()=>{

    currentFloor =
      floorSelect.value;

    roomPanel.classList.add(
      "hidden"
    );

    emptyState.classList.remove(
      "hidden"
    );

    renderFloor();

  }
);

editBtn.addEventListener(
  "click",
  ()=>{

    editMode = true;

    editBtn.classList.add(
      "hidden"
    );

    saveBtn.classList.remove(
      "hidden"
    );

    addPaintBtn.classList.remove(
      "hidden"
    );

    renderRoomData();

  }
);

saveBtn.addEventListener(
  "click",
  ()=>{

    const room =
      getCurrentRoom();

    const inputs =
      document.querySelectorAll(
        ".paint-card input"
      );

    inputs.forEach(input=>{

      const index =
        input.dataset.index;

      const field =
        input.dataset.field;

      room.paints[index][field] =
        input.value;

    });

    room.notes =
      notesField.value;

    saveData();

    editMode = false;

    editBtn.classList.remove(
      "hidden"
    );

    saveBtn.classList.add(
      "hidden"
    );

    addPaintBtn.classList.add(
      "hidden"
    );

    renderRoomData();

  }
);

addPaintBtn.addEventListener(
  "click",
  ()=>{

    getCurrentRoom()
      .paints
      .push({

        location:"",
        color:"",
        brand:"",
        finish:""

      });

    renderRoomData();

  }
);

document.addEventListener(
  "keydown",
  (event)=>{

    if(!drawMode) return;

    if(event.key === "Escape"){

      cancelDrawMode();

    }

    if(event.key === "Enter"){

      finishDrawMode();

    }

  }
);

renderFloor();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Paint Map Manager</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f3f3;
}

.topbar{
  height:70px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.topbar-left{
  display:flex;
  align-items:center;
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.layout{
  display:flex;
  height:calc(100vh - 70px);
}

.map-section{
  flex:7;
  overflow:auto;
  padding:16px;
}

.sidebar{
  flex:3;
  background:white;
  border-left:1px solid #ddd;
  padding:20px;
  overflow-y:auto;
}

.map-container{
  position:relative;
  width:100%;
}

#floorImage{
  width:100%;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

#overlay{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.room{
  fill:rgba(0,150,255,0.08);
  stroke:rgba(0,150,255,0.5);
  stroke-width:2;
  vector-effect:non-scaling-stroke;
  cursor:pointer;
}

.room:hover{
  fill:rgba(0,150,255,0.25);
  stroke:rgba(0,150,255,1);
}

.room.active{
  fill:rgba(0,150,255,0.35);
  stroke:rgba(0,150,255,1);
}

.draw-point{
  fill:red;
}

.temp-line{
  stroke:red;
  stroke-width:2;
  fill:rgba(255,0,0,0.12);
}

.point-label{
  fill:red;
  font-size:18px;
  font-weight:bold;
}

button{
  padding:10px 14px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

button.secondary{
  background:#777;
}

button.danger{
  background:#b42318;
}

.hidden{
  display:none;
}

.draw-status{
  position:absolute;
  top:12px;
  left:12px;
  background:rgba(0,0,0,0.75);
  color:white;
  padding:10px 14px;
  border-radius:8px;
  font-size:14px;
}

.instructions{
  font-size:14px;
  color:#666;
  line-height:1.5;
}

.room-header{
  position:sticky;
  top:-20px;
  background:white;
  padding-bottom:14px;
  margin-bottom:18px;
  border-bottom:1px solid #ddd;
}

.room-title{
  margin:0;
  font-size:32px;
}

.floor-label{
  color:#666;
  margin-top:6px;
  font-size:14px;
}

.paint-display-card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:18px;
  margin-bottom:16px;
  background:#fafafa;
}

.paint-surface{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.paint-name{
  font-size:26px;
  font-weight:bold;
  margin-bottom:8px;
}

.paint-code{
  font-size:18px;
  color:#444;
  margin-bottom:16px;
}

.paint-meta-row{
  display:flex;
  gap:20px;
}

.paint-meta{
  flex:1;
}

.meta-label{
  font-size:11px;
  color:#777;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
}

.meta-value{
  font-size:16px;
}

.notes-section{
  margin-top:20px;
}

.notes-text{
  background:#fafafa;
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
  line-height:1.5;
}

.edit-card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:16px;
  margin-bottom:16px;
  background:#fafafa;
}

.edit-card input,
textarea{
  width:100%;
  padding:10px;
  margin-top:4px;
  margin-bottom:14px;
}

.edit-buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
}

</style>

</head>

<body>

<header class="topbar">

  <div class="topbar-left">

    <h2>
      Paint Map Manager
    </h2>

  </div>

  <div class="topbar-right">

    <button id="drawBtn">
      Draw Room
    </button>

    <button
      id="finishBtn"
      class="hidden"
    >
      Finish Room
    </button>

    <button
      id="cancelBtn"
      class="hidden secondary"
    >
      Cancel
    </button>

    <select id="floorSelect">

      <option value="1st-floor">
        1st Floor
      </option>

      <option value="2nd-floor">
        2nd Floor
      </option>

      <option value="5th-floor">
        5th Floor
      </option>

    </select>

  </div>

</header>

<div class="layout">

  <section class="map-section">

    <div class="map-container">

      <div
        id="drawStatus"
        class="draw-status hidden"
      >

        Drawing Room...

        <br>

        ENTER = Finish

        <br>

        ESC = Cancel

      </div>

      <img
        id="floorImage"
        src="1st-floor.png"
      >

      <svg
        id="overlay"
        viewBox="0 0 2000 743"
        preserveAspectRatio="xMidYMid meet"
      ></svg>

    </div>

  </section>

  <aside class="sidebar">

    <div id="emptyState">

      <h2>
        Select a room
      </h2>

      <div class="instructions">

        Click a room polygon
        to view paint info.

        <br><br>

        Use Draw Room to
        create new rooms.

      </div>

    </div>

    <div
      id="roomPanel"
      class="hidden"
    >

      <div class="room-header">

        <h1
          id="roomTitle"
          class="room-title"
        ></h1>

        <div
          id="floorLabel"
          class="floor-label"
        ></div>

        <div
          class="edit-buttons"
        >

          <button id="editBtn">
            Edit
          </button>

          <button
            id="saveBtn"
            class="hidden"
          >
            Save
          </button>

          <button
            id="cancelEditBtn"
            class="hidden secondary"
          >
            Cancel
          </button>

        </div>

      </div>

      <div id="paintContainer"></div>

      <button
        id="addPaintBtn"
        class="hidden"
      >
        + Add Paint
      </button>

      <div
        class="notes-section"
      >

        <h3>
          Notes
        </h3>

        <div
          id="notesDisplay"
          class="notes-text"
        >
          No notes
        </div>

        <textarea
          id="notesField"
          rows="5"
          class="hidden"
        ></textarea>

      </div>

    </div>

  </aside>

</div>

<script>

const floorImage =
  document.getElementById("floorImage");

const floorSelect =
  document.getElementById("floorSelect");

const overlay =
  document.getElementById("overlay");

const drawBtn =
  document.getElementById("drawBtn");

const finishBtn =
  document.getElementById("finishBtn");

const cancelBtn =
  document.getElementById("cancelBtn");

const drawStatus =
  document.getElementById("drawStatus");

const roomPanel =
  document.getElementById("roomPanel");

const emptyState =
  document.getElementById("emptyState");

const roomTitle =
  document.getElementById("roomTitle");

const floorLabel =
  document.getElementById("floorLabel");

const paintContainer =
  document.getElementById("paintContainer");

const notesField =
  document.getElementById("notesField");

const notesDisplay =
  document.getElementById("notesDisplay");

const editBtn =
  document.getElementById("editBtn");

const saveBtn =
  document.getElementById("saveBtn");

const cancelEditBtn =
  document.getElementById("cancelEditBtn");

const addPaintBtn =
  document.getElementById("addPaintBtn");

let currentFloor = "1st-floor";

let currentRoom = null;

let editMode = false;

let drawMode = false;

let drawPoints = [];

const defaultBuildingData = {

  floors: {

    "1st-floor": {

      image:"1st-floor.png",

      rooms:[]

    },

    "2nd-floor": {

      image:"2nd-floor.png",

      rooms:[]

    },

    "5th-floor": {

      image:"5th-floor.png",

      rooms:[]

    }

  }

};

function loadData(){

  const saved =
    localStorage.getItem(
      "buildingData"
    );

  if(saved){

    return JSON.parse(saved);

  }

  localStorage.setItem(
    "buildingData",
    JSON.stringify(
      defaultBuildingData
    )
  );

  return defaultBuildingData;

}

let buildingData = loadData();

function saveData(){

  localStorage.setItem(
    "buildingData",
    JSON.stringify(buildingData)
  );

}

function getCurrentFloorData(){

  return buildingData
    .floors[currentFloor];

}

function getCurrentRoom(){

  return getCurrentFloorData()
    .rooms
    .find(
      room => room.id === currentRoom
    );

}

function renderFloor(){

  overlay.innerHTML = "";

  const floor =
    getCurrentFloorData();

  floorImage.src = floor.image;

  floor.rooms.forEach(room => {

    const polygon =
      document.createElementNS(
        "http://www.w3.org/2000/svg",
        "polygon"
      );

    polygon.setAttribute(
      "points",
      room.points
    );

    polygon.setAttribute(
      "class",
      "room"
    );

    polygon.addEventListener(
      "click",
      (event)=>{

        if(drawMode) return;

        event.stopPropagation();

        selectRoom(room.id);

        document
          .querySelectorAll(".room")
          .forEach(r=>{
            r.classList.remove("active");
          });

        polygon.classList.add(
          "active"
        );

      }
    );

    overlay.appendChild(
      polygon
    );

  });

  if(drawMode){

    renderDrawPreview();

  }

}

function selectRoom(roomId){

  currentRoom = roomId;

  const room =
    getCurrentRoom();

  if(!room) return;

  emptyState.classList.add(
    "hidden"
  );

  roomPanel.classList.remove(
    "hidden"
  );

  roomTitle.textContent =
    room.id;

  floorLabel.textContent =
    currentFloor
      .replace("-", " ")
      .replace("floor", "Floor");

  renderRoomData();

}

function renderRoomData(){

  const room =
    getCurrentRoom();

  paintContainer.innerHTML =
    "";

  if(!editMode){

    room.paints.forEach(paint=>{

      const card =
        document.createElement("div");

      card.className =
        "paint-display-card";

      card.innerHTML = `

        <div class="paint-surface">
          ${paint.surface || ""}
        </div>

        <div class="paint-name">
          ${paint.color || ""}
        </div>

        <div class="paint-code">
          ${paint.code || ""}
        </div>

        <div class="paint-meta-row">

          <div class="paint-meta">

            <div class="meta-label">
              Finish
            </div>

            <div class="meta-value">
              ${paint.finish || ""}
            </div>

          </div>

          <div class="paint-meta">

            <div class="meta-label">
              Brand
            </div>

            <div class="meta-value">
              ${paint.brand || ""}
            </div>

          </div>

        </div>

      `;

      paintContainer.appendChild(
        card
      );

    });

    notesDisplay.textContent =
      room.notes || "No notes";

  }

  else{

    room.paints.forEach(
      (paint,index)=>{

        const card =
          document.createElement("div");

        card.className =
          "edit-card";

        card.innerHTML = `

          <label>
            Surface
          </label>

          <input
            data-field="surface"
            data-index="${index}"
            value="${paint.surface || ""}"
          >

          <label>
            Color Name
          </label>

          <input
            data-field="color"
            data-index="${index}"
            value="${paint.color || ""}"
          >

          <label>
            Paint Code
          </label>

          <input
            data-field="code"
            data-index="${index}"
            value="${paint.code || ""}"
          >

          <label>
            Finish
          </label>

          <input
            data-field="finish"
            data-index="${index}"
            value="${paint.finish || ""}"
          >

          <label>
            Brand
          </label>

          <input
            data-field="brand"
            data-index="${index}"
            value="${paint.brand || ""}"
          >

          <button
            class="danger"
            onclick="deletePaint(${index})"
          >
            Delete Paint
          </button>

        `;

        paintContainer.appendChild(
          card
        );

      }
    );

  }

}

function deletePaint(index){

  const confirmed = confirm(
    "Delete this paint?"
  );

  if(!confirmed) return;

  const room =
    getCurrentRoom();

  room.paints.splice(index,1);

  renderRoomData();

}

function startDrawMode(){

  drawMode = true;

  drawPoints = [];

  drawBtn.classList.add(
    "hidden"
  );

  finishBtn.classList.remove(
    "hidden"
  );

  cancelBtn.classList.remove(
    "hidden"
  );

  drawStatus.classList.remove(
    "hidden"
  );

  renderFloor();

}

function cancelDrawMode(){

  drawMode = false;

  drawPoints = [];

  drawBtn.classList.remove(
    "hidden"
  );

  finishBtn.classList.add(
    "hidden"
  );

  cancelBtn.classList.add(
    "hidden"
  );

  drawStatus.classList.add(
    "hidden"
  );

  renderFloor();

}

function finishDrawMode(){

  if(drawPoints.length < 3){

    alert(
      "Need at least 3 points"
    );

    return;

  }

  const roomName = prompt(
    "Enter room name"
  );

  if(!roomName) return;

  const room = {

    id: roomName,

    points: drawPoints
      .map(
        p => `${p[0]},${p[1]}`
      )
      .join(" "),

    paints:[],

    notes:""

  };

  getCurrentFloorData()
    .rooms
    .push(room);

  saveData();

  drawMode = false;

  drawPoints = [];

  drawBtn.classList.remove(
    "hidden"
  );

  finishBtn.classList.add(
    "hidden"
  );

  cancelBtn.classList.add(
    "hidden"
  );

  drawStatus.classList.add(
    "hidden"
  );

  renderFloor();

}

function renderDrawPreview(){

  drawPoints.forEach(
    (point,index)=>{

      const circle =
        document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );

      circle.setAttribute(
        "cx",
        point[0]
      );

      circle.setAttribute(
        "cy",
        point[1]
      );

      circle.setAttribute(
        "r",
        5
      );

      circle.setAttribute(
        "class",
        "draw-point"
      );

      overlay.appendChild(
        circle
      );

      const text =
        document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text"
        );

      text.setAttribute(
        "x",
        point[0] + 10
      );

      text.setAttribute(
        "y",
        point[1] - 10
      );

      text.setAttribute(
        "class",
        "point-label"
      );

      text.textContent =
        index + 1;

      overlay.appendChild(
        text
      );

    }
  );

  if(drawPoints.length > 1){

    const polyline =
      document.createElementNS(
        "http://www.w3.org/2000/svg",
        "polyline"
      );

    polyline.setAttribute(
      "points",
      drawPoints
        .map(
          p => `${p[0]},${p[1]}`
        )
        .join(" ")
    );

    polyline.setAttribute(
      "class",
      "temp-line"
    );

    overlay.appendChild(
      polyline
    );

  }

}

overlay.addEventListener(
  "click",
  (event)=>{

    if(!drawMode) return;

    const pt =
      overlay.createSVGPoint();

    pt.x = event.clientX;

    pt.y = event.clientY;

    const svgPoint =
      pt.matrixTransform(
        overlay
          .getScreenCTM()
          .inverse()
      );

    drawPoints.push([
      svgPoint.x,
      svgPoint.y
    ]);

    renderFloor();

  }
);

drawBtn.addEventListener(
  "click",
  startDrawMode
);

cancelBtn.addEventListener(
  "click",
  cancelDrawMode
);

finishBtn.addEventListener(
  "click",
  finishDrawMode
);

floorSelect.addEventListener(
  "change",
  ()=>{

    currentFloor =
      floorSelect.value;

    roomPanel.classList.add(
      "hidden"
    );

    emptyState.classList.remove(
      "hidden"
    );

    renderFloor();

  }
);

editBtn.addEventListener(
  "click",
  ()=>{

    editMode = true;

    editBtn.classList.add(
      "hidden"
    );

    saveBtn.classList.remove(
      "hidden"
    );

    cancelEditBtn.classList.remove(
      "hidden"
    );

    addPaintBtn.classList.remove(
      "hidden"
    );

    notesDisplay.classList.add(
      "hidden"
    );

    notesField.classList.remove(
      "hidden"
    );

    notesField.value =
      getCurrentRoom().notes;

    renderRoomData();

  }
);

cancelEditBtn.addEventListener(
  "click",
  ()=>{

    editMode = false;

    editBtn.classList.remove(
      "hidden"
    );

    saveBtn.classList.add(
      "hidden"
    );

    cancelEditBtn.classList.add(
      "hidden"
    );

    addPaintBtn.classList.add(
      "hidden"
    );

    notesDisplay.classList.remove(
      "hidden"
    );

    notesField.classList.add(
      "hidden"
    );

    renderRoomData();

  }
);

saveBtn.addEventListener(
  "click",
  ()=>{

    const room =
      getCurrentRoom();

    const inputs =
      document.querySelectorAll(
        ".edit-card input"
      );

    inputs.forEach(input=>{

      const index =
        input.dataset.index;

      const field =
        input.dataset.field;

      room.paints[index][field] =
        input.value;

    });

    room.notes =
      notesField.value;

    saveData();

    editMode = false;

    editBtn.classList.remove(
      "hidden"
    );

    saveBtn.classList.add(
      "hidden"
    );

    cancelEditBtn.classList.add(
      "hidden"
    );

    addPaintBtn.classList.add(
      "hidden"
    );

    notesDisplay.classList.remove(
      "hidden"
    );

    notesField.classList.add(
      "hidden"
    );

    renderRoomData();

  }
);

addPaintBtn.addEventListener(
  "click",
  ()=>{

    getCurrentRoom()
      .paints
      .push({

        surface:"",
        color:"",
        code:"",
        finish:"",
        brand:""

      });

    renderRoomData();

  }
);

document.addEventListener(
  "keydown",
  (event)=>{

    if(!drawMode) return;

    if(event.key === "Escape"){

      cancelDrawMode();

    }

    if(event.key === "Enter"){

      finishDrawMode();

    }

  }
);

renderFloor();

</script>

</body>

</html>
